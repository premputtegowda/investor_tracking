function b64ToU8(b64){
  const bin = atob(b64);
  const u8  = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

async function unlock(){
  const pwd = document.getElementById('pwd').value;
  const err = document.getElementById('err');
  err.textContent = '';
  try {
    const data = b64ToU8(PAYLOAD);
    const salt = data.slice(0, 16);
    const iv   = data.slice(16, 28);
    const ct   = data.slice(28);
    const baseKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt, iterations: 250000, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
    const html  = new TextDecoder().decode(plain);
    document.open(); document.write(html); document.close();
  } catch (e) {
    err.textContent = 'Wrong password — try again.';
  }
}
document.getElementById('go').addEventListener('click', unlock);
document.getElementById('pwd').addEventListener('keydown', e => { if (e.key==='Enter') unlock(); });
